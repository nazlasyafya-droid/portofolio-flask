{% extends 'base.html' %}
{% block title %}About{% endblock %}
{% block content %}

<section class="about-page">
    <h1>Tentang Saya</h1>
    <p>{{ profile.about }}</p>

    <h2>Skill & Keahlian</h2>
    <ul class="skill-list">
        {% for skill in skills %}
        <li>{{ skill.name }}</li>
        {% else %}
        <li>Belum ada skill ditambahkan.</li>
        {% endfor %}
    </ul>
</section>

{% endblock %}
