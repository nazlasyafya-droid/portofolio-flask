{% extends 'base.html' %}
{% block title %}Kelola Proyek{% endblock %}
{% block content %}

<h1>Kelola Proyek</h1>

<a href="{{ url_for('add_project') }}" class="btn">+ Tambah Proyek Baru</a>

<table class="data-table">
    <thead>
        <tr>
            <th>Gambar</th>
            <th>Judul</th>
            <th>Teknologi</th>
            <th>Aksi</th>
        </tr>
    </thead>
    <tbody>
        {% for project in projects %}
        <tr>
            <td><img src="{{ url_for('static', filename='uploads/' + project.image_file) }}" alt="{{ project.title }}" class="thumb"></td>
            <td>{{ project.title }}</td>
            <td>{{ project.technologies }}</td>
            <td>
                <a href="{{ url_for('edit_project', id=project.id) }}">Edit</a>
                <form method="POST" action="{{ url_for('delete_project', id=project.id) }}" style="display:inline;" onsubmit="return confirm('Yakin ingin menghapus proyek ini?');">
                    <button type="submit" class="btn-delete">Hapus</button>
                </form>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="4">Belum ada proyek.</td></tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
