{% extends 'base.html' %}
{% block title %}Tambah Proyek{% endblock %}
{% block content %}

<h1>Tambah Proyek Baru</h1>

{% if error %}
<p class="alert-error">{{ error }}</p>
{% endif %}

<form method="POST" action="{{ url_for('add_project') }}" enctype="multipart/form-data" class="project-form">
    <label for="title">Judul Proyek</label>
    <input type="text" id="title" name="title" required>

    <label for="description">Deskripsi</label>
    <textarea id="description" name="description" rows="4" required></textarea>

    <label for="technologies">Teknologi (pisahkan dengan koma)</label>
    <input type="text" id="technologies" name="technologies" placeholder="Python, Flask, SQLite">

    <label for="github_link">Link GitHub</label>
    <input type="url" id="github_link" name="github_link">

    <label for="live_link">Link Demo (opsional)</label>
    <input type="url" id="live_link" name="live_link">

    <label for="image">Gambar Proyek</label>
    <input type="file" id="image" name="image" accept=".png,.jpg,.jpeg,.gif,.webp">

    <button type="submit">Simpan Proyek</button>
    <a href="{{ url_for('dashboard_projects') }}">Batal</a>
</form>

{% endblock %}
